name: Deploy Fabric Catalog

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Triggered by other workspace repos via repository_dispatch
  repository_dispatch:
    types: [workspace-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Fetch workspace.json from all registered workspace repos
      - name: Fetch workspace metadata
        env:
          GH_TOKEN: ${{ secrets.CATALOG_TOKEN }}
          ORG: ${{ vars.GITHUB_ORG }}
        run: |
          mkdir -p docs/data
          echo "[]" > docs/data/workspaces.json

          # Les liste over registrerte repos fra repos.txt
          while IFS= read -r repo; do
            [[ "$repo" =~ ^#.*$ || -z "$repo" ]] && continue
            echo "Fetching: $repo"
            curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github.raw" \
              "https://api.github.com/repos/$ORG/$repo/contents/workspace.json?ref=main" \
              >> /tmp/ws_raw.json && echo "" >> /tmp/ws_raw.json || true
          done < repos.txt

          # Kombiner til array
          python3 scripts/merge_workspaces.py /tmp/ws_raw.json docs/data/workspaces.json

      - name: Inject data into HTML
        run: |
          python3 scripts/inject_data.py docs/data/workspaces.json docs/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-catalog
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
